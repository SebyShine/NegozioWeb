<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodotti Negozio Online</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Negozio Online</h1>

        <div class="filters">
            <input type="text" id="cercaNome" class="search-bar" placeholder="Cerca prodotto per nome...">
            <select id="filtroCategoria" class="category-filter">
                <option value="">Tutte le categorie</option>
            </select>
        </div>

        <div>
            <table>
                <thead>
                    <th>Immagine</th>
                    <th>Nome</th>
                    <th>Prezzo</th>
                    <th>Disponibilità</th>
                </thead>
                <tbody id="tabellaProdotti">

                </tbody>
            </table>
        </div>

        <div id="modale" class="modal nascosto">
            <div class="modal-content">
                <h2 id="prodottoNome"></h2>
                <img src="" alt="" id="prodottoImmagine">
                <p id="prodottoDescrizione"></p>
                <p id="prodottoPrezzo"></p>
                <p id="prodottoDisponibilita"></p>
                <span id="chiudi" class="close">×</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
