<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodotti Negozio Online</title>
    <link rel="stylesheet" href="style.css">
    <!-- Ricordarsi di inserire il link al CSS -->

</head>

<body>

    <div class="container">
        <div>
            <table>
                <thead>
                    <!-- <th>--</th> -->
                    <th>Immagine</th>
                    <th>Nome</th>
                    <th>Prezzo</th>
                    <th>Disponibilità</th>
                </thead>
                <tbody id="tabellaProdotti">

                </tbody>
            </table>
        </div>

        <div class="modal nascosto" id="modale">
            <div class="modal-content">
                <h2 id="prodottoNome"></h2>
                <img src="" alt="" id="prodottoImmagine">
                <p id="prodottoDescrizione"></p>
                <p id="prodottoPrezzo"></p>
                <p id="prodottoDisponibilità"></p>
                <span id="chiudi" class="close">×</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
